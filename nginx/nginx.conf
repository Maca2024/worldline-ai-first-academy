# Worldline AI-First Academy — nginx reverse proxy
# Replace academy.jouwdomein.com with your actual domain
# SSL: see deploy.sh for Let's Encrypt setup

server {
    listen 80;
    server_name academy.jouwdomein.com;

    # Redirect HTTP → HTTPS once SSL is configured
    # Uncomment after running certbot:
    # return 301 https://$host$request_uri;

    # ── Proxy to Next.js ──
    location / {
        proxy_pass         http://academy:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for AI endpoints (Claude can be slow)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}

